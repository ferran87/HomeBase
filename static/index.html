<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeBase</title>
  <link rel="stylesheet" href="/static/style.css?v=3" />
</head>
<body>
  <div class="container">
    <h1>🏠 HomeBase</h1>

    <!-- Speaker selection -->
    <div class="speaker-toggle" id="speaker-toggle">
      <!-- Populated by app.js from /api/users -->
    </div>

    <!-- Language selector -->
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="ca-ES" onclick="setLanguage('ca-ES')">Català</button>
      <button class="lang-btn" data-lang="es-ES" onclick="setLanguage('es-ES')">Español</button>
      <button class="lang-btn" data-lang="en-US" onclick="setLanguage('en-US')">English</button>
    </div>

    <!-- Mic button -->
    <div class="mic-wrap">
      <button id="mic-btn" title="Tap to start/stop recording">🎙️</button>
    </div>

    <div id="status"></div>

    <!-- Confirmation card (hidden until voice processed) -->
    <div id="confirm-card">
      <span id="confirm-tag" class="tag"></span>
      <p id="confirm-transcription" class="transcription"></p>
      <dl id="confirm-extracted" class="extracted"></dl>
      <div class="card-actions">
        <button class="btn btn-confirm" id="btn-confirm">Save ✓</button>
        <button class="btn btn-discard" id="btn-discard">Discard</button>
      </div>
    </div>

    <!-- Tab navigation -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="feed" onclick="switchTab('feed')">📋 Feed</button>
      <button class="tab-btn" data-tab="calendar" onclick="switchTab('calendar')">📅 Calendar</button>
      <button class="tab-btn" data-tab="notes" onclick="switchTab('notes')">📝 Notes</button>
    </nav>

    <!-- ── FEED TAB ──────────────────────────────────────────────── -->
    <div id="tab-feed" class="tab-panel active">

      <!-- Night shift widget -->
      <div id="shift-widget">
        <h2>Tonight's shift</h2>
        <div class="shift-toggle" id="shift-toggle"></div>
        <div class="shift-history" id="shift-history"></div>
      </div>

      <!-- Daily feed -->
      <div id="feed">
        <h2>Today</h2>
        <div id="feed-items"></div>
      </div>
    </div>

    <!-- ── CALENDAR TAB ──────────────────────────────────────────── -->
    <div id="tab-calendar" class="tab-panel">
      <div class="cal-header">
        <button class="cal-nav" id="cal-prev" onclick="calNav(-1)">◀</button>
        <span id="cal-title" class="cal-title"></span>
        <button class="cal-nav" id="cal-next" onclick="calNav(1)">▶</button>
      </div>
      <!-- Day-of-week headers -->
      <div class="cal-grid" id="cal-grid">
        <div class="cal-dow">Mo</div>
        <div class="cal-dow">Tu</div>
        <div class="cal-dow">We</div>
        <div class="cal-dow">Th</div>
        <div class="cal-dow">Fr</div>
        <div class="cal-dow">Sa</div>
        <div class="cal-dow">Su</div>
        <!-- Day cells injected here by JS -->
      </div>
      <!-- Events for the selected day -->
      <div id="cal-events">
        <p class="muted-hint">Tap a day to see appointments</p>
      </div>
    </div>

    <!-- ── NOTES TAB ─────────────────────────────────────────────── -->
    <div id="tab-notes" class="tab-panel">
      <div class="notes-filter">
        <button class="filter-btn active" data-cat="" onclick="filterNotes('')">All</button>
        <button class="filter-btn" data-cat="baby" onclick="filterNotes('baby')">🍼 Baby</button>
        <button class="filter-btn" data-cat="dog" onclick="filterNotes('dog')">🐕 Dog</button>
        <button class="filter-btn" data-cat="household" onclick="filterNotes('household')">🏠 Home</button>
      </div>
      <div id="notes-list"></div>
    </div>

  </div><!-- /container -->

  <script src="/static/app.js?v=3"></script>
</body>
</html>
